name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests (Phase 1 + Phase 2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e .

      - name: Install runtime dependencies
        # torch (CPU), gymnasium, mujoco, and imageio (required by mujoco_rendering).
        # Versions are not pinned here so CI resolves compatible releases.
        run: pip install torch gymnasium mujoco imageio

      - name: Phase 1 — determinism smoke (10 steps)
        run: |
          python scripts/smoke_determinism.py \
            --env_id HalfCheetah-v4 \
            --seed 0 \
            --steps 10

      - name: Phase 2 — clean eval smoke (2 episodes, random policy)
        run: |
          python scripts/eval_clean_random.py \
            --env_id HalfCheetah-v4 \
            --seed 0 \
            --episodes 2 \
            --out results/ci_tmp.json
